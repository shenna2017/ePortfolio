<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Page Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: #f4f4f9;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 6px;
    }

    button:hover {
      background-color: #45a049;
    }

    #output {
      margin-top: 20px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Hello GitHub Pages 👋</h1>
  <p>This is a simple test page you can deploy.</p>

  <button onclick="showMessage()">Click Me</button>

  <div id="output"></div>

  <script>
    function showMessage() {
      const messages = [
        "Nice click!",
        "It works 🎉",
        "You're running JavaScript on GitHub Pages!",
        "Keep building 🚀"
      ];

      const random = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("output").innerText = random;
    }
  </script>

</body>
